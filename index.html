<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Empire - Official App</title>
    <!-- Adsgram Library -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f12;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            background-color: #24242e;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 2px solid #0088cc;
        }
        .meme-card {
            background-color: #1c1c24;
            width: 90%;
            max-width: 400px;
            margin: 20px 0;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .meme-img {
            width: 100%;
            height: 250px;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #888;
        }
        .meme-content {
            padding: 15px;
            text-align: center;
        }
        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .btn {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-reward {
            background-color: #ff9800;
        }
        .footer {
            margin-top: auto;
            padding: 20px;
            font-size: 12px;
            color: #777;
        }
        #status {
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">MEME EMPIRE 👑</div>

    <div class="meme-card">
        <div class="meme-img">
            <!-- Yahan aap kisi bhi meme ki image ka link dal sakte hain -->
            <img src="https://via.placeholder.com/400x250.png?text=Daily+Meme+Update" alt="Meme" style="width:100%">
        </div>
        <div class="meme-content">
            <h3>Aaj ka Best Meme!</h3>
            <p>Mazedaar memes dekhne ke liye button par click karein.</p>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn">Next Meme</button>
        <button class="btn btn-reward" id="playAdBtn">Get Coins 💰</button>
    </div>

    <div id="status"></div>

    <div class="footer">
        © 2026 Meme Empire | Powered by Telegram Mini Apps
    </div>

    <script>
        // Adsgram ID yahan update karein (nayi wali ID jab mile)
        const AdController = window.Adsgram.init({ blockId: "int-25579" });

        const playAdBtn = document.getElementById('playAdBtn');
        const statusText = document.getElementById('status');

        playAdBtn.addEventListener('click', () => {
            statusText.innerText = "Loading ad...";
            AdController.show().then((result) => {
                statusText.innerText = "Success! Coins added.";
                statusText.style.color = "#4caf50";
            }).catch((err) => {
                statusText.innerText = "Ad could not load.";
                statusText.style.color = "#f44336";
            });
        });
    </script>

</body>
</html>
